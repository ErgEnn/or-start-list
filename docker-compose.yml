services:
  postgres:
    image: postgres:16-alpine
    container_name: or-start-list-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: or_user
      POSTGRES_PASSWORD: or_password
      POSTGRES_DB: or_start_list
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U or_user -d or_start_list"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

