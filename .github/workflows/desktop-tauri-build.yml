name: Desktop Tauri Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "desktop-v*"
      - "v*"
    paths:
      - "apps/desktop/**"
      - ".github/workflows/desktop-tauri-build.yml"
  pull_request:
    paths:
      - "apps/desktop/**"
      - ".github/workflows/desktop-tauri-build.yml"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app
        run: pnpm --filter @or/desktop tauri:build
        env:
          BUILD_NUMBER: ${{ github.run_number }}

      - name: Compute release metadata
        if: github.event_name == 'workflow_dispatch' || github.ref_type == 'tag' || github.ref == 'refs/heads/main'
        id: release_meta
        shell: pwsh
        run: |
          $version = (Get-Content "apps/desktop/src-tauri/tauri.conf.json" | ConvertFrom-Json).version
          if ("${{ github.ref_type }}" -eq "tag") {
            "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
            "name=Desktop ${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
            "prerelease=false" >> $env:GITHUB_OUTPUT
          } elseif ("${{ github.ref }}" -eq "refs/heads/main") {
            $shortSha = "${{ github.sha }}".Substring(0, 7)
            "tag=desktop-build-${{ github.run_number }}" >> $env:GITHUB_OUTPUT
            "name=Desktop Build #${{ github.run_number }} ($shortSha)" >> $env:GITHUB_OUTPUT
            "prerelease=true" >> $env:GITHUB_OUTPUT
          } else {
            $shortSha = "${{ github.sha }}".Substring(0, 7)
            "tag=desktop-v$version-$shortSha" >> $env:GITHUB_OUTPUT
            "name=Desktop v$version ($shortSha)" >> $env:GITHUB_OUTPUT
            "prerelease=true" >> $env:GITHUB_OUTPUT
          }

      - name: Publish GitHub release assets
        if: github.event_name == 'workflow_dispatch' || github.ref_type == 'tag' || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ steps.release_meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
          append_body: false
          make_latest: ${{ github.ref_type == 'tag' }}
          files: |
            apps/desktop/src-tauri/target/release/or_start_list_desktop.exe
            apps/desktop/src-tauri/target/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/release/bundle/**/*.msi
