name: Desktop Tauri Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "desktop-v*"
      - "v*"
    paths:
      - "apps/desktop/**"
      - ".github/workflows/desktop-tauri-build.yml"
  pull_request:
    paths:
      - "apps/desktop/**"
      - ".github/workflows/desktop-tauri-build.yml"

permissions:
  contents: write

jobs:
  release-meta:
    if: github.event_name == 'workflow_dispatch' || github.ref_type == 'tag' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      name: ${{ steps.meta.outputs.name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: apps/desktop/src-tauri/tauri.conf.json

      - name: Compute release metadata
        id: meta
        run: |
          version=$(jq -r '.version' apps/desktop/src-tauri/tauri.conf.json)
          short_sha="${{ github.sha }}"
          short_sha="${short_sha:0:7}"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "name=Desktop ${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=desktop-build-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "name=Desktop Build #${{ github.run_number }} ($short_sha)" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=desktop-v${version}-${short_sha}" >> "$GITHUB_OUTPUT"
            echo "name=Desktop v${version} ($short_sha)" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app
        run: pnpm --filter @or/desktop tauri:build
        env:
          BUILD_NUMBER: ${{ github.run_number }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            apps/desktop/src-tauri/target/release/or_start_list_desktop.exe
            apps/desktop/src-tauri/target/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/release/bundle/**/*.msi

  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize Tauri Android
        run: pnpm --filter @or/desktop exec tauri android init

      - name: Build Android APK
        run: pnpm --filter @or/desktop exec tauri android build --apk
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/desktop/src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  publish-release:
    if: github.event_name == 'workflow_dispatch' || github.ref_type == 'tag' || github.ref == 'refs/heads/main'
    needs: [release-meta, build-windows, build-android]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: windows

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: android

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-meta.outputs.tag }}
          name: ${{ needs.release-meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ needs.release-meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
          append_body: false
          make_latest: ${{ github.ref_type == 'tag' }}
          files: |
            windows/**/*.exe
            windows/**/*.msi
            android/**/*.apk
